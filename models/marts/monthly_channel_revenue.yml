version: 2

models:
  - name: monthly_channel_revenue
    description: "Monthly revenue by sales channel. This is the presentation layer model for downstream consumers. Excludes pending orders."
    config:
      contract:
        enforced: true
    columns:
      - name: sales_channel
        description: "Channel through which sales were made (Online, Retail Store, B2B Portal)"
        data_type: text

      - name: revenue_year
        description: "Year of the sales transaction"
        data_type: integer

      - name: revenue_month
        description: "Month of the sales transaction (1-12)"
        data_type: integer

      - name: total_revenue
        description: "Total revenue for the channel, year, and month. Sum of line_total_usd excluding pending orders."
        data_type: numeric
