# Supabase remote: set your personal access token (sbp_...) before running dbt:
#   export SUPABASE_ACCESS_TOKEN="sbp_..."
#   dbt debug --target supabase

sales_data_product:
  target: local
  outputs:
    local:
      type: postgres
      host: localhost
      port: 5432
      user: developer
      password: "{{ env_var('POSTGRES_LOCAL_PASSWORD') }}"
      dbname: sales_data_product
      schema: public
      threads: 4
    supabase:
      type: postgres
      host: "db.fizhqhsmhiusvmefoejo.supabase.co"
      port: 5432
      user: "postgres"
      password: "Developer!12345$$"
      dbname: "postgres"
      schema: "public"
      threads: 4
      sslmode: require

