name: dbt CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: dbt-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DBT_PROFILES_DIR: ${{ github.workspace }}

jobs:
  dbt:
    name: dbt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: dbt debug
        run: dbt debug --target supabase

      - name: dbt seed
        run: dbt seed --full-refresh --target supabase

      - name: dbt run
        run: dbt run --target supabase

      - name: dbt test
        run: dbt test --target supabase
